<div class="row">
    <div class="col-md-8">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Név</th>
                    <th>Lakcím</th>
                    <th>Egyenleg</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody>
                @for(user of users(); track user.id) {
                    <tr>
                        <td>{{ user.name }}</td>
                        <td>{{ user.address }}</td>
                        <td>{{ user.balance }} Ft</td>
                        <td>
                            <button class="btn btn-primary me-2" (click)="editUser(user)">Szerkesztés</button>
                            <button class="btn btn-danger" (click)="deleteUser(user)">Törlés</button>
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
