<div class="row justify-content-center">
    <div class="col-6 text-center">
        <h3>Welcome to our AI assistant!</h3>
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6">
        <input type="text" id="username" name="username"
            class="form-control" placeholder="Username" [(ngModel)]="username">
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6">
        <input type="password" id="api-key" name="api-key"
            class="form-control" placeholder="API Key" [(ngModel)]="apiKey">
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6 text-end">
        <button class="btn btn-outline-primary" (click)="login()">Sign in</button>
    </div>
</div>
