<div class="row justify-content-center">
    <div class="col-6 text-center">
        <h4>Welcome to our AI assistant!</h4>
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6">
        <input type="text" class="form-control" id="username"
            name="username" placeholder="Username" [(ngModel)]="username">
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6">
        <input type="password" class="form-control" id="api-key"
            name="api-key" placeholder="API Key" [(ngModel)]="apiKey">
    </div>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-6 text-end">
        <button class="btn btn-outline-primary" (click)="login()">Login</button>
    </div>
</div>
